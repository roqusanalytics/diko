<svg xmlns="http://www.w3.org/2000/svg" viewBox="18 40 64 56" width="64" height="56">
  <defs>
    <!-- Subtle glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#c49a3f" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <g filter="url(#glow)">
    <!-- Bar 1 (Leftmost) -->
    <rect x="22" y="50" width="8" height="16" rx="4" fill="#c49a3f">
      <animate attributeName="y" values="50; 44; 50" dur="1.2s" begin="0s" repeatCount="indefinite" />
      <animate attributeName="height" values="16; 28; 16" dur="1.2s" begin="0s" repeatCount="indefinite" />
    </rect>
    
    <!-- Bar 2 -->
    <rect x="34" y="54" width="8" height="24" rx="4" fill="#c49a3f">
      <animate attributeName="y" values="54; 48; 54" dur="1.2s" begin="0.2s" repeatCount="indefinite" />
      <animate attributeName="height" values="24; 36; 24" dur="1.2s" begin="0.2s" repeatCount="indefinite" />
    </rect>
    
    <!-- Bar 3 (Center - longest) -->
    <rect x="46" y="56" width="8" height="30" rx="4" fill="#c49a3f">
      <animate attributeName="y" values="56; 48; 56" dur="1.2s" begin="0.4s" repeatCount="indefinite" />
      <animate attributeName="height" values="30; 46; 30" dur="1.2s" begin="0.4s" repeatCount="indefinite" />
    </rect>
    
    <!-- Bar 4 -->
    <rect x="58" y="54" width="8" height="24" rx="4" fill="#c49a3f">
      <animate attributeName="y" values="54; 48; 54" dur="1.2s" begin="0.6s" repeatCount="indefinite" />
      <animate attributeName="height" values="24; 36; 24" dur="1.2s" begin="0.6s" repeatCount="indefinite" />
    </rect>
    
    <!-- Bar 5 (Rightmost) -->
    <rect x="70" y="50" width="8" height="16" rx="4" fill="#c49a3f">
      <animate attributeName="y" values="50; 44; 50" dur="1.2s" begin="0.8s" repeatCount="indefinite" />
      <animate attributeName="height" values="16; 28; 16" dur="1.2s" begin="0.8s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
